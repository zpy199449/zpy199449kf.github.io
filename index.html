L.Polyline.include({
    snakeIn: function(speed = 200) {
        this._snakePoints = []; this._snakeTime = 0; this._snakeSpeed = speed;
        var points = this._latlngs;
        for (var i=0; i<points.length; i++) {
            this._snakePoints.push({ latlng: points[i], distance: i>0 ? this._distance(points[i-1], points[i]) : 0, totalDistance: 0 });
        }
        for (i=1; i<this._snakePoints.length; i++) this._snakePoints[i].totalDistance = this._snakePoints[i-1].totalDistance + this._snakePoints[i].distance;
        this._totalDistance = this._snakePoints[this._snakePoints.length-1].totalDistance;
        this._snakeStart(); return this;
    },
    _snakeStart: function() { this._snakeFrame(); },
    _snakeFrame: function() {
        this._snakeTime += 16;
        var progress = Math.min(this._snakeTime / this._snakeSpeed, 1);
        var currentDistance = this._totalDistance * progress;
        var latlngs = [];
        for (var i=0; i<this._snakePoints.length; i++) {
            if (this._snakePoints[i].totalDistance <= currentDistance) latlngs.push(this._snakePoints[i].latlng);
            else {
                if (i>0) {
                    var seg = (currentDistance - this._snakePoints[i-1].totalDistance) / this._snakePoints[i].distance;
                    var lat = this._snakePoints[i-1].latlng.lat + (this._snakePoints[i].latlng.lat - this._snakePoints[i-1].latlng.lat)*seg;
                    var lng = this._snakePoints[i-1].latlng.lng + (this._snakePoints[i].latlng.lng - this._snakePoints[i-1].latlng.lng)*seg;
                    latlngs.push(L.latLng(lat,lng));
                } break;
            }
        }
        this.setLatLngs(latlngs);
        if (progress<1) requestAnimationFrame(L.bind(this._snakeFrame, this));
    },
    _distance: function(a,b) {
        var R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
        var x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
    }
});

function initMap() {
    map = L.map('map').setView([34.5, 112.0], 5);
    const tileLight = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', { subdomains: ['1','2','3','4'], attribution: '高德地图' });
    const tileDark = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', { subdomains: ['1','2','3','4'] });
    tileLight.addTo(map);
    let currentTheme = 'light';
    document.getElementById('themeBtn').onclick = () => {
        if(currentTheme === 'light') { map.removeLayer(tileLight); tileDark.addTo(map); currentTheme='dark'; }
        else { map.removeLayer(tileDark); tileLight.addTo(map); currentTheme='light'; }
    };
    markersGroup.addTo(map);
    routeGroup.addTo(map);

    pointsData.forEach(p => {
        const iconDiv = L.divIcon({ html: `<div style="background:${p.category==='rural'?'#2e8b57':'#e67e22'}; width:26px; height:26px; border-radius:50%; border:2px solid gold; display:flex; align-items:center; justify-content:center; font-size:14px;">${p.icon}</div>`, iconSize:[26,26], className:'custom-marker' });
        const marker = L.marker([p.lat, p.lng], { icon: iconDiv });
        marker.bindPopup(`<b>${p.name}</b><br>${p.year}年<br>${p.desc}`);
        marker.on('click', () => {
            document.getElementById('dynamicInfoText').innerHTML = `<strong>${p.name}</strong> (${p.year}) — ${p.desc}`;
        });
        allMarkers.push({ marker, data: p });
        markersGroup.addLayer(marker);
    });

    routesData.forEach(r => {
        if (r.points) {
            let latlngs = r.points.map(coord => L.latLng(coord[0], coord[1]));
            let poly = L.polyline(latlngs, { color: r.color, weight: 3.5, opacity: 0.8 });
            poly.bindPopup(`<b>${r.name}</b><br>始于${r.yearStart}年`);
            allRoutes.push({ poly, data: r });
        } else if (r.lat && r.lng && r.radius) {
            let circle = L.circle([r.lat, r.lng], {
                radius: r.radius,
                color: r.color,
                fillColor: r.color,
                fillOpacity: 0.15,
                weight: 3
            });
            circle.bindPopup(`<b>${r.name}</b><br>沿海经济开放区`);
            allRoutes.push({ poly: circle, data: r });
        }
    });

    updateMapByYear(currentYear);
    animateRoutesByYear(currentYear);
    initYearTimeline();
    document.getElementById('toggleReformPoints').onchange = () => filterMarkersByCat();
    document.getElementById('toggleOpenPoints').onchange = () => filterMarkersByCat();
    document.getElementById('toggleRoutes').onchange = (e) => { if(e.target.checked) routeGroup.addTo(map); else map.removeLayer(routeGroup); };
    
    document.getElementById('backToHomeBtn').onclick = () => {
        resetQuizProgress();
        document.getElementById('finalReport').classList.remove('active');
    };

    resetQuizProgress();
}

function initYearTimeline() {
    const items = document.querySelectorAll('.year-item');
    items.forEach(item => {
        item.addEventListener('click', () => {
            const year = parseInt(item.dataset.year);
            switchToYear(year);
        });
    });
}

function switchToYear(year) {
    if(modalActive) return;
    currentYear = year;
    document.getElementById('currentYearLabel').textContent = year;
    document.querySelectorAll('.year-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`[data-year="${year}"]`).classList.add('active');
    updateMapByYear(year);
    triggerQuizByYear(year);
}

function triggerQuizByYear(year) {
    if (modalActive) return;
    const node = timelineNodes.find(n => n.year === year);
    if (node) {
        showModalForNode(node);
    }
}

function filterMarkersByCat() {
    const reform = document.getElementById('toggleReformPoints').checked;
    const open = document.getElementById('toggleOpenPoints').checked;
    allMarkers.forEach(({ marker, data }) => {
        let visible = data.year <= currentYear;
        if(data.category === 'rural') visible = visible && reform;
        if(data.category === 'open') visible = visible && open;
        if(visible) marker.addTo(markersGroup); else marker.removeFrom(markersGroup);
    });
}

function updateMapByYear(year) {
    currentYear = year;
    allMarkers.forEach(({ marker, data }) => {
        let show = data.year <= year;
        if(data.category === 'rural') show = show && document.getElementById('toggleReformPoints').checked;
        if(data.category === 'open') show = show && document.getElementById('toggleOpenPoints').checked;
        if(show) marker.addTo(markersGroup); else marker.removeFrom(markersGroup);
    });
    routeGroup.clearLayers();
    allRoutes.forEach(({ poly, data }) => {
        if(data.yearStart <= year) {
            routeGroup.addLayer(poly);
        }
    });
    animateRoutesByYear(year);
}

function animateRoutesByYear(year) {
    routeGroup.clearLayers();
    allRoutes.forEach(({ poly, data }) => {
        if(data.yearStart <= year) {
            if (data.points) {
                const latlngs = data.points.map(c => L.latLng(c[0], c[1]));
                const newLine = L.polyline(latlngs, { color: data.color, weight: 3.5, opacity: 0.9 });
                newLine.bindPopup(`<b>${data.name}</b><br>始于${data.yearStart}年`);
                routeGroup.addLayer(newLine);
                setTimeout(() => { newLine.snakeIn(280); }, 100);
            } else {
                routeGroup.addLayer(poly);
            }
        }
    });
}

function showModalForNode(node) {
    modalActive = true;
    currentModalNode = node;
    const modal = document.getElementById('quizModal');
    document.getElementById('modalQuestionText').innerHTML = node.question;
    const optsDiv = document.getElementById('modalOptions');
    optsDiv.innerHTML = '';
    
    node.options.forEach((opt, idx) => {
        const optEl = document.createElement('div');
        optEl.className = 'modal-option';
        optEl.innerHTML = `${String.fromCharCode(65+idx)}. ${opt}`;
        optEl.onclick = () => {
            document.querySelectorAll('.modal-option').forEach(el => el.classList.remove('selected'));
            optEl.classList.add('selected');
            optEl.dataset.selected = idx;
        };
        optsDiv.appendChild(optEl);
    });
    
    document.getElementById('modalFeedback').innerHTML = '';
    modal.classList.add('active');
}

document.getElementById('modalSubmitBtn').onclick = () => {
    const selected = document.querySelector('.modal-option.selected');
    if (!selected) { alert('请选择一个答案'); return; }
    
    const idx = parseInt(selected.dataset.selected);
    const correct = (idx === currentModalNode.correct);
    const feedback = document.getElementById('modalFeedback');
    
    if (correct) {
        feedback.style.background = "#e6f7e9";
        feedback.style.color = "#2e7d32";
        feedback.innerHTML = "✅ 回答正确！" + currentModalNode.explanation;
    } else {
        feedback.style.background = "#ffebee";
        feedback.style.color = "#c62828";
        feedback.innerHTML = "❌ 回答错误，正确答案：" + currentModalNode.options[currentModalNode.correct] + "<br>" + currentModalNode.explanation;
    }

    userAnswers.push({
        year: currentModalNode.year,
        nodeName: currentModalNode.name,
        question: currentModalNode.question,
        userAnswer: currentModalNode.options[idx],
        correctAnswer: currentModalNode.options[currentModalNode.correct],
        correct: correct
    });

    setTimeout(() => {
        document.getElementById('quizModal').classList.remove('active');
        modalActive = false;
        
        if (currentYear === 1990) {
            showFinalQuiz();
        }
    }, 2200);
};

function showFinalQuiz() {
    const container = document.getElementById('finalQuestionsContainer');
    container.innerHTML = '';
    
    finalQuestions.forEach((q, qIdx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'final-question';
        qDiv.innerHTML = `<h3>${q.title}</h3>`;
        
        q.options.forEach((opt, oIdx) => {
            const oDiv = document.createElement('div');
            oDiv.className = 'final-option';
            oDiv.textContent = opt;
            oDiv.onclick = () => {
                document.querySelectorAll(`.final-question:nth-child(${qIdx+1}) .final-option`).forEach(el => el.classList.remove('selected'));
                oDiv.classList.add('selected');
                finalUserAnswers[q.id] = { qIdx, oIdx, text: opt, correct: oIdx === q.correct };
            };
            qDiv.appendChild(oDiv);
        });

        const fb = document.createElement('div');
        fb.className = 'final-feedback';
        fb.id = `finalFB${qIdx}`;
        qDiv.appendChild(fb);
        container.appendChild(qDiv);
    });
    
    document.getElementById('finalReport').classList.add('active');
}

document.getElementById('submitFinalBtn').onclick = () => {
    let allAnswered = true;
    finalQuestions.forEach((q, i) => {
        if (!finalUserAnswers[q.id]) allAnswered = false;
    });
    if (!allAnswered) { alert('请完成所有探究题目！'); return; }

    finalQuestions.forEach((q, idx) => {
        const fb = document.getElementById(`finalFB${idx}`);
        const ans = finalUserAnswers[q.id];
        fb.style.display = 'block';
        if (ans.correct) {
            fb.style.background = "#e6f7e9";
            fb.style.color = "#2e7d32";
            fb.innerHTML = "✅ 回答正确！" + q.explanation;
        } else {
            fb.style.background = "#ffebee";
            fb.style.color = "#c62828";
            fb.innerHTML = "❌ 回答错误，正确答案：" + q.options[q.correct] + "<br>" + q.explanation;
        }
    });
    document.getElementById('finalMsg').textContent = '✅ 答案已提交，查看结果！';
};

function resetQuizProgress() {
    currentNodeIndex = 0;
    userAnswers = [];
    finalUserAnswers = {};
    modalActive = false;
    document.getElementById('quizModal').classList.remove('active');
    
    // 直接返回 1990 年，显示完整生长路线
    currentYear = 1990;
    document.getElementById('currentYearLabel').textContent = currentYear;
    document.querySelectorAll('.year-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`[data-year="${currentYear}"]`).classList.add('active');
    updateMapByYear(currentYear);
}

window.onload = initMap;
</script>
</body>
</html>
